[workspace]

# Was necessary after switching to dev tree-sitter to fix this warning:
# > some crates are on edition 2021 which defaults to `resolver = "2"`, but
# > virtual workspaces default to `resolver = "1"`.
#
# Also necessary to enable the `testing` feature of harp only when testing
# (i.e. when building downstream packages like Ark with Harp's `testing`
# feature set in `dev-dependencies`).
resolver = "2"

members = [
    "crates/amalthea",
    "crates/ark",
    "crates/echo",
    "crates/harp",
    "crates/libr",
    "crates/stdext",
]

[workspace.package]
rust-version = "1.85"
edition = "2021"
license = "MIT"
authors = ["Posit Software, PBC"]

[workspace.dependencies]
biome_line_index = { path = "/Users/lionel/Sync/Projects/Positron/biome/crates/biome_line_index" }
biome_rowan = { path = "/Users/lionel/Sync/Projects/Positron/biome/crates/biome_rowan" }
aether_factory = { path = "/Users/lionel/Sync/Projects/Positron/air/crates/air_r_factory", package = "air_r_factory" }
aether_lsp_utils = { path = "/Users/lionel/Sync/Projects/Positron/air/crates/aether_lsp_utils" }
aether_parser = { path = "/Users/lionel/Sync/Projects/Positron/air/crates/air_r_parser", package = "air_r_parser" }
aether_syntax = { path = "/Users/lionel/Sync/Projects/Positron/air/crates/air_r_syntax", package = "air_r_syntax" }
# For https://github.com/ebkalderon/tower-lsp/pull/428
tower-lsp = { branch = "bugfix/patches", git = "https://github.com/lionel-/tower-lsp" }

name: "Test Ark - macOS"

on:
  workflow_call:
  workflow_dispatch:

jobs:
  macos:
    name: "Rust: ${{ matrix.config.rust }}, R: ${{ matrix.config.r }}, OS: ${{ matrix.config.runs_on }}"
    runs-on: ${{ matrix.config.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - { rust: 'nightly', r: 'release', runs_on: 'macos-latest' }
          - { rust: 'stable', r: '4.2', runs_on: 'macos-14' }
    timeout-minutes: 40
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure environment
        run: grep -v '^#' .github/env/macos.env >> $GITHUB_ENV

      - name: Report Rust Toolchain
        run: rustup show

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      # This configures Makevars to look for brew headers and libraries. Useful
      # to compile packages used in tests when they have just been released to
      # CRAN and there is no binary we can download yet. We've needed this for
      # data.table.
      - name: Configure R compilation flags
        run: |
          mkdir -p ~/.R
          echo "CPPFLAGS += -I$(brew --prefix gettext)/include" >> ~/.R/Makevars
          echo "LDFLAGS += -L$(brew --prefix gettext)/lib" >> ~/.R/Makevars

      - name: Install R Packages Required For Tests
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'
          packages:
            data.table
            dplyr
            haven
            R6
            ragg
            readr
            rstudioapi
            survival
            tibble

      - name: Build
        run: |
          cargo build

      - name: Run Tests
        env:
          NEXTEST_PROFILE: "ci"
        run: |
          cargo nextest run
